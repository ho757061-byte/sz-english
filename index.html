// ── Fetch all words from Supabase (paginated) ──
async function fetchAllWords() {
  const all = [];
  let offset = 0;
  while (true) {
    const d = await sbGet(`vocab_words?select=english,chinese,chapter_num,test_paper,priority,pos,phonetic&order=chapter_num.asc,test_paper.asc,english.asc&offset=${offset}&limit=1000`);
    if (!d.length) break;
    all.push(...d);
    offset += 1000;
    if (d.length < 1000) break;
  }
  // sort into order: 必听 Ch3→4→5→11→12, then 选听 Ch6→7→8→9→10
  const mustOrder = [3, 4, 5, 11, 12],
    optOrder = [6, 7, 8, 9, 10];
  const must = mustOrder.flatMap(ch => all.filter(w => w.priority === "必听" && w.chapter_num === ch));
  const opt = optOrder.flatMap(ch => all.filter(w => w.priority === "选听" && w.chapter_num === ch));
  return [...must, ...opt].map((w, i) => ({
    ...w,
    idx: i,
    tp: `Ch${w.chapter_num}`
  }));
}
