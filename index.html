async function getCursor() {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/inspirations?type=eq.vocab_cursor&select=id,content`, { headers: sbHeaders });
    const d = await r.json();
    if (d.length > 0) return { id: d[0].id, pos: parseInt(d[0].content) || 0 };
    const r2 = await fetch(`${SB_URL}/rest/v1/inspirations`, { method: "POST", headers: { ...sbHeaders, Prefer: "return=representation" }, body: JSON.stringify({ type: "vocab_cursor", title: "cursor", content: "0" }) });
    const d2 = await r2.json();
    return { id: d2[0].id, pos: 0 };
  } catch { return { id: null, pos: 0 }; }
}
async function saveCursor(id, pos) {
  if (!id) return;
  try { await fetch(`${SB_URL}/rest/v1/inspirations?id=eq.${id}`, { method: "PATCH", headers: { ...sbHeaders, Prefer: "return=minimal" }, body: JSON.stringify({ content: String(pos) }) }); } catch {}
}

{result==="ok"&&<div style={{fontFamily:f.mono,fontSize:"1rem",color:c.ok,marginBottom:6}}>{sent.answer} ✓</div>}
<div style={{fontFamily:f.mono,fontSize:"0.78rem",color:c.dim,marginBottom:10}}>{cur.phonetic}</div>
{zheNotes[cur.id]&&<div style={{margin:"12px auto",maxWidth:300,padding:"10px 14px",background:"rgba(226,232,240,0.15)",borderRadius:10,borderLeft:"3px solid rgba(148,163,184,0.3)"}}><div style={{fontFamily:f.note,fontSize:"0.8rem",color:"rgba(148,163,184,0.9)",fontStyle:"italic",lineHeight:1.7}}>{zheNotes[cur.id]}</div><div style={{fontFamily:f.ui,fontSize:"0.55rem",color:c.pale,marginTop:3}}>— 辙</div></div>}
<button onClick={next} style={{fontFamily:f.ui,background:"none",border:"1px solid rgba(226,232,240,0.7)",color:c.dim,padding:"7px 18px",borderRadius:10,cursor:"pointer",fontSize:"0.8rem",marginTop:8}}>下一个 →</button></div>}
{!result&&<div style={{display:"flex",gap:10,justifyContent:"center",marginTop:16}}><button onClick={check} style={{fontFamily:f.ui,background:"#475569",color:"#fff",border:"none",padding:"10px 20px",borderRadius:12,cursor:"pointer",fontSize:"0.85rem"}}>确认</button><button onClick={reveal} style={{fontFamily:f.ui,background:"none",border:"1px solid rgba(226,232,240,0.7)",color:c.dim,padding:"10px 16px",borderRadius:12,cursor:"pointer",fontSize:"0.82rem"}}>看答案</button></div>}
</div>}</div>;
}

// ── Dictation (听写: hear → type, uses ALL session words) ──
function Dictation({goBack,session,record}){
const [pool,setPool]=useState([]);const [idx,setIdx]=useState(0);const [input,setInput]=useState("");const [result,setResult]=useState(null);const [st,setSt]=useState({ok:0,no:0});const [done,setDone]=useState(false);const [spd,setSpd]=useState(0.85);const ref=useRef(null);
useEffect(()=>{const unique=[...new Map(session.map(w=>[w.id,w])).values()];setPool([...unique].sort(()=>Math.random()-0.5));setIdx(0);setInput("");setResult(null);setSt({ok:0,no:0});setDone(false);},[session]);
const cur=pool[idx];
useEffect(()=>{if(cur&&!result){const t=setTimeout(()=>speak(cur.english,spd),400);return()=>clearTimeout(t);}},[idx,result]);
const check=()=>{if(!cur||result)return;const ok=input.trim().toLowerCase()===cur.english.toLowerCase();setResult(ok?"ok":"no");setSt(s=>({ok:s.ok+(ok?1:0),no:s.no+(ok?0:1)}));record(cur.id,ok,input.trim(),"dictation");};
const next=()=>{if(idx+1>=pool.length){setDone(true);return;}setIdx(i=>i+1);setInput("");setResult(null);setTimeout(()=>ref.current?.focus(),50);};
useEffect(()=>{const h=(e)=>{if(e.key==="Enter"&&result){e.preventDefault();next();}};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[result,idx]);
if(done) return <div><BackBtn onClick={goBack}/><div style={{textAlign:"center",padding:"40px 0"}}><div style={{fontSize:44,marginBottom:10}}>✏️</div><div style={{fontFamily:f.title,fontSize:"1.4rem",color:c.text}}>听写完成</div><div style={{fontFamily:f.ui,fontSize:"0.9rem",color:c.mid,marginTop:8}}>✓{st.ok} · ✗{st.no} · {st.ok+st.no>0?Math.round(st.ok/(st.ok+st.no)*100):0}%</div><button onClick={goBack} style={{fontFamily:f.ui,background:"#475569",color:"#fff",border:"none",padding:"10px 20px",borderRadius:12,cursor:"pointer",fontSize:"0.85rem",marginTop:20}}>回首页</button></div></div>;
return <div><BackBtn onClick={goBack}/>
<div style={{display:"flex",gap:6,marginBottom:16,alignItems:"center"}}><select value={spd} onChange={e=>setSpd(+e.target.value)} style={{fontFamily:f.ui,background:"rgba(255,255,255,0.5)",color:c.mid,border:"1px solid #e2e8f0",padding:"5px 8px",borderRadius:16,fontSize:"0.78rem"}}><option value={0.6}>0.6x</option><option value={0.75}>0.75x</option><option value={0.85}>0.85x</option><option value={1}>1x</option><option value={1.2}>1.2x</option></select><span style={{fontFamily:f.ui,fontSize:"0.75rem",color:c.pale,marginLeft:"auto"}}>今日 {pool.length} 词</span></div>
<SessionBar s={st} total={pool.length}/>
{cur&&<div style={{...glass,padding:"36px 20px",textAlign:"center"}}><div style={{fontFamily:f.ui,fontSize:"0.7rem",color:c.pale,letterSpacing:2,marginBottom:16}}>{cur.tp}</div>
<button onClick={()=>speak(cur.english,spd)} style={{background:"rgba(255,255,255,0.45)",border:"1.5px solid rgba(226,232,240,0.7)",cursor:"pointer",fontSize:26,borderRadius:"50%",width:60,height:60,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>🔊</button>
{result&&<div style={{fontFamily:f.ui,fontSize:"0.9rem",color:c.mid,marginBottom:10}}>{cur.chinese}</div>}
<div style={{maxWidth:420,margin:"0 auto"}}><input ref={ref} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!result){check();}}} placeholder="type what you hear…" autoFocus disabled={!!result} style={{width:"100%",padding:"11px 14px",fontFamily:f.mono,fontSize:"1.05rem",textAlign:"center",border:`1.5px solid ${result==="ok"?"#86efac":result==="no"?"#fca5a5":"#e2e8f0"}`,borderRadius:12,outline:"none",color:c.text,background:result==="ok"?"rgba(34,197,94,0.05)":result==="no"?"rgba(251,113,133,0.05)":"rgba(255,255,255,0.35)",transition:"all 0.3s",boxSizing:"border-box"}}/></div>
{result&&<div style={{marginTop:16}}>{result==="no"&&<div style={{fontFamily:f.mono,fontSize:"1rem",marginBottom:6}}><span style={{color:c.no,textDecoration:"line-through",opacity:0.4}}>{input}</span><span style={{color:c.ok,marginLeft:10}}>{cur.english}</span></div>}{result==="ok"&&<div style={{fontFamily:f.mono,fontSize:"1rem",color:c.ok}}>{cur.english} ✓</div>}<button onClick={next} style={{fontFamily:f.ui,background:"none",border:"1px solid rgba(226,232,240,0.7)",color:c.dim,padding:"7px 18px",borderRadius:10,cursor:"pointer",fontSize:"0.8rem",marginTop:10}}>下一个 →</button></div>}
{!result&&<button onClick={check} style={{fontFamily:f.ui,background:"#475569",color:"#fff",border:"none",padding:"10px 20px",borderRadius:12,cursor:"pointer",fontSize:"0.85rem",marginTop:16}}>确认</button>}
</div>}</div>;
}

function Test({goBack,session,record}){
const [pool,setPool]=useState([]);const [idx,setIdx]=useState(0);const [input,setInput]=useState("");const [result,setResult]=useState(null);const [st,setSt]=useState({ok:0,no:0});const [done,setDone]=useState(false);const ref=useRef(null);
useEffect(()=>{const unique=[...new Map(session.map(w=>[w.id,w])).values()];setPool([...unique].sort(()=>Math.random()-0.5));setIdx(0);setInput("");setResult(null);setSt({ok:0,no:0});setDone(false);},[session]);
const cur=pool[idx];
const check=()=>{if(!cur||result)return;const ok=input.trim().toLowerCase()===cur.english.toLowerCase();setResult(ok?"ok":"no");setSt(s=>({ok:s.ok+(ok?1:0),no:s.no+(ok?0:1)}));record(cur.id,ok,input.trim(),"test");};

return <div><BackBtn onClick={goBack}/>

<SessionBar s={st} total={pool.length}/>
{cur&&<div style={{...glass,padding:"36px 20px",textAlign:"center"}}><div style={{fontFamily:f.ui,fontSize:"0.7rem",color:c.pale,letterSpacing:2,marginBottom:16}}>{cur.tp}</div>
<div style={{fontFamily:f.ui,fontSize:"1.4rem",fontWeight:300,color:c.text,marginBottom:6}}>{cur.chinese}</div>
<div style={{fontFamily:f.ui,fontSize:"0.75rem",color:c.pale,marginBottom:20}}>{cur.pos}</div>
{result&&<div style={{marginBottom:10}}><button onClick={()=>speak(cur.english)} style={{background:"none",border:"none",cursor:"pointer",fontSize:"0.8rem",color:c.dim,fontFamily:f.ui}}>🔊 听发音</button></div>}
<div style={{maxWidth:420,margin:"0 auto"}}><input ref={ref} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!result){check();}}} placeholder="type the English word…" autoFocus disabled={!!result} style={{width:"100%",padding:"11px 14px",fontFamily:f.mono,fontSize:"1.05rem",textAlign:"center",border:`1.5px solid ${result==="ok"?"#86efac":result==="no"?"#fca5a5":"#e2e8f0"}`,borderRadius:12,outline:"none",color:c.text,background:result==="ok"?"rgba(34,197,94,0.05)":result==="no"?"rgba(251,113,133,0.05)":"rgba(255,255,255,0.35)",transition:"all 0.3s",boxSizing:"border-box"}}/></div>
{result&&<div style={{marginTop:16}}>{result==="no"&&<div style={{fontFamily:f.mono,fontSize:"1rem",marginBottom:6}}><span style={{color:c.no,textDecoration:"line-through",opacity:0.4}}>{input}</span><span style={{color:c.ok,marginLeft:10}}>{cur.english}</span></div>}{result==="ok"&&<div style={{fontFamily:f.mono,fontSize:"1rem",color:c.ok}}>{cur.english} ✓</div>}<button onClick={next} style={{fontFamily:f.ui,background:"none",border:"1px solid rgba(226,232,240,0.7)",color:c.dim,padding:"7px 18px",borderRadius:10,cursor:"pointer",fontSize:"0.8rem",marginTop:10}}>下一个 →</button></div>}
{!result&&<button onClick={check} style={{fontFamily:f.ui,background:"#475569",color:"#fff",border:"none",padding:"10px 20px",borderRadius:12,cursor:"pointer",fontSize:"0.85rem",marginTop:16}}>确认</button>}
</div>}</div>;
}

// ── Wrong ──
function Wrong({goBack,notes,notesId,setNotes,errors}){
// combine persistent errors with in-memory prog
const memWids=[...new Set(prog.filter(p=>!p.correct).map(p=>p.wid))];
const errWids=[...new Set((errors||[]).map(e=>e.wid))];
const allWids=[...new Set([...memWids,...errWids])];
const list=allWids.map(id=>WORDS.find(x=>x.id===id)).filter(Boolean);
// get last wrong spelling for each word from errors
const lastTyped={};(errors||[]).forEach(e=>{if(e.typed&&e.typed!=="[revealed]")lastTyped[e.wid]=e.typed;});

const saveTimer=useRef(null);
const updateNote=(wid,text)=>{const next={...notes,[wid]:text};if(!text)delete next[wid];setNotes(next);clearTimeout(saveTimer.current);saveTimer.current=setTimeout(()=>saveNotes(notesId,next),800);};
return <div><BackBtn onClick={goBack}/>
<div style={{fontFamily:f.ui,fontSize:"0.95rem",fontWeight:500,color:c.text,marginBottom:14}}>错词集 <span style={{fontWeight:300,color:c.dim}}>({list.length})</span></div>
{!list.length?<div style={{textAlign:"center",padding:"40px 0",fontFamily:f.note,fontSize:"0.95rem",color:c.dim}}>还没有错词 🎉</div>:
<div style={{display:"flex",flexDirection:"column",gap:10}}>
{list.map((w)=><div key={w.id} style={{...glass,padding:"14px 16px",background:"rgba(255,255,255,0.4)"}}>
  <div onClick={()=>speak(w.english)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",marginBottom:4}}>
    <div><span style={{fontFamily:f.mono,fontSize:"0.95rem",color:c.text}}>{w.english}</span><span style={{fontFamily:f.mono,fontSize:"0.7rem",color:c.pale,marginLeft:8}}>{w.phonetic}</span></div>
    <span style={{fontFamily:f.ui,fontSize:"0.82rem",color:c.mid}}>{w.chinese}</span>
  </div>
  {lastTyped[w.id]&&<div style={{fontFamily:f.mono,fontSize:"0.75rem",color:c.no,marginBottom:4}}>你写的：{lastTyped[w.id]}</div>}
  <textarea value={notes[w.id]||""} onChange={e=>updateNote(w.id,e.target.value)} placeholder="" rows={2}
    style={{width:"100%",padding:"8px 10px",fontFamily:f.note,fontSize:"0.8rem",color:c.text,background:"rgba(226,232,240,0.12)",border:"1px solid rgba(226,232,240,0.3)",borderRadius:8,outline:"none",resize:"vertical",lineHeight:1.6,boxSizing:"border-box",marginTop:4}}/>
</div>)}
</div>}
</div>;
}

// ── Review (list with numbering) ──
function Review({goBack,session}){
const [revealed,setRevealed]=useState({});
const [filterWeak,setFilterWeak]=useState(false);
const unique=[...new Map(session.map(w=>[w.id,w])).values()];
if(!unique.length) return <div><BackBtn onClick={goBack}/><div style={{textAlign:"center",padding:40,fontFamily:f.note,fontSize:"0.95rem",color:c.dim}}>先去选词吧</div></div>;
const list=filterWeak?unique.filter(w=>revealed[w.id]):unique;
const weakCount=Object.keys(revealed).length;
const toggle=(id)=>{setRevealed(r=>{const next={...r};if(next[id]){delete next[id];}else{next[id]=true;prog.push({wid:id,correct:false,ans:"[review]"});}return next;});};
return <div>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
  <BackBtn onClick={goBack}/>
  <span style={{fontFamily:f.ui,fontSize:"0.75rem",color:c.pale}}>{list.length} 词{filterWeak?" · 薄弱词":""}</span>
</div>
<div style={{display:"flex",flexDirection:"column",gap:6}}>
{list.map((w,i)=>{
  const isWeak=!!revealed[w.id];
  return <div key={w.id}
    style={{...glass,padding:"14px 16px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",
      background:isWeak?"rgba(251,113,133,0.06)":"rgba(255,255,255,0.4)",
      border:isWeak?"1px solid rgba(251,113,133,0.15)":"1px solid rgba(255,255,255,0.45)",
      transition:"all 0.3s"}}>
    <div onClick={()=>speak(w.english)} style={{flex:1}}>
      <span style={{fontFamily:f.ui,fontSize:"0.7rem",color:c.pale,marginRight:8}}>{i+1}</span>
      <span style={{fontFamily:f.mono,fontSize:"0.95rem",color:c.text}}>{w.english}</span>
      <span style={{fontFamily:f.mono,fontSize:"0.7rem",color:c.pale,marginLeft:8}}>{w.phonetic}</span>
    </div>
    <div onClick={(e)=>{e.stopPropagation();speak(w.english);toggle(w.id);}} style={{fontFamily:f.ui,fontSize:"0.85rem",color:isWeak?c.text:"transparent",minWidth:60,textAlign:"right",userSelect:"none",transition:"color 0.3s"}}>
      {isWeak?w.chinese:<span style={{color:c.pale,fontSize:"0.7rem"}}>点击</span>}
    </div>
  </div>;
})}
</div>
{weakCount>0&&!filterWeak&&<div style={{textAlign:"center",padding:"20px 0 8px"}}>
  <div style={{fontFamily:f.ui,fontSize:"0.82rem",color:c.dim,marginBottom:10}}>查看了 {weakCount} 个词</div>
  <button onClick={()=>setFilterWeak(true)} style={{fontFamily:f.ui,background:"rgba(251,113,133,0.08)",border:"1px solid rgba(251,113,133,0.2)",color:c.no,padding:"9px 20px",borderRadius:10,cursor:"pointer",fontSize:"0.82rem"}}>只看它们</button>
</div>}
{filterWeak&&<div style={{textAlign:"center",padding:"20px 0 8px"}}>
  <button onClick={()=>setFilterWeak(false)} style={{fontFamily:f.ui,background:"none",border:"1px solid rgba(226,232,240,0.7)",color:c.dim,padding:"8px 18px",borderRadius:10,cursor:"pointer",fontSize:"0.8rem"}}>看全部</button>
</div>}
{weakCount===0&&<div style={{textAlign:"center",padding:"24px 0",fontFamily:f.note,fontSize:"0.85rem",color:c.dim}}>全都认识？那去测试验证一下</div>}
<div style={{textAlign:"center",padding:"16px 0 8px"}}><button onClick={goBack} style={{fontFamily:f.ui,background:"rgba(255,255,255,0.5)",border:"1px solid rgba(226,232,240,0.7)",color:c.text,cursor:"pointer",fontSize:"0.85rem",padding:"10px 28px",borderRadius:12}}>← 返回</button></div>
</div>;
}

// ── Main ──
const App = function App(){
const [view,setView]=useState("home");
const [today,setToday]=useState({total:0,ok:0});
const [session,setSession]=useState([]);
const [cursor,setCursor]=useState(0);
const [cursorId,setCursorId]=useState(null);
const [notes,setNotes]=useState({});
const [notesId,setNotesId]=useState(null);
const [errors,setErrors]=useState([]); // persistent dictation errors
const [sdId,setSdId]=useState(null);   // session data supabase id
const [loading,setLoading]=useState(true);
const wide=useWide();
const has=session.length>0;
const saveRef=useRef(null);

// record a practice result — updates today count, saves dictation errors
const recordResult=(wid, correct, typed, mode)=>{
  prog.push({wid, correct, ans:typed});
  setToday(t=>{
    const nt={total:t.total+1, ok:t.ok+(correct?1:0)};
    const newErrors = (!correct && mode==="dictation") ? [...errors,{wid,typed,date:todayStr()}] : errors;
    if(!correct && mode==="dictation") setErrors(newErrors);
    clearTimeout(saveRef.current);
    saveRef.current=setTimeout(()=>{
      saveSessionData(sdId,{today_date:todayStr(),today_total:nt.total,today_ok:nt.ok,errors:newErrors,session_ids:session.map(w=>w.id)});
    },500);
    return nt;
  });
};

// wrap setSession to also persist to Supabase
const updateSession=(words)=>{
  setSession(words);
  if(sdId){
    saveSessionData(sdId,{today_date:todayStr(),today_total:today.total,today_ok:today.ok,errors,session_ids:words.map(w=>w.id)});
  }
};

useEffect(()=>{Promise.all([getCursor(),getNotes(),getSessionData()]).then(([cur,nt,sd])=>{
  setCursor(cur.pos);setCursorId(cur.id);
  setNotes(nt.data);setNotesId(nt.id);
  setSdId(sd.id);
  setErrors(sd.errors||[]);
  if(sd.today_date===todayStr()){
    setToday({total:sd.today_total||0,ok:sd.today_ok||0});
    // restore session from saved IDs
    if(sd.session_ids&&sd.session_ids.length>0){
      const restored=sd.session_ids.map(id=>WORDS.find(w=>w.id===id)).filter(Boolean);
      setSession(restored);
    }
  } else{setToday({total:0,ok:0});}
  setLoading(false);
});},[]);

if(loading) return <div style={{fontFamily:f.ui,background:c.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:c.dim}}>加载中…</div>;

return <div style={{fontFamily:f.ui,background:c.bg,minHeight:"100vh",padding:wide?"0 32px 24px":"0 16px 16px",maxWidth:wide?640:480,margin:"0 auto",boxSizing:"border-box",color:c.text,lineHeight:1.6,fontSize:wide?"1.05rem":"1rem"}}>
{view==="home"&&<Home today={today} setView={setView} session={session} cursor={cursor} total={ORDERED.length}/>}
{view==="study"&&<StudyView goBack={()=>setView("home")} session={session} setSession={updateSession} cursor={cursor} setCursor={setCursor} cursorId={cursorId}/>}
{view==="context"&&(has?<ContextQuiz goBack={()=>setView("home")} session={session} record={recordResult}/>:<NeedSession goBack={()=>setView("home")} onGoStudy={()=>setView("study")}/>)}
{view==="dictation"&&(has?<Dictation goBack={()=>setView("home")} session={session} record={recordResult}/>:<NeedSession goBack={()=>setView("home")} onGoStudy={()=>setView("study")}/>)}
{view==="test"&&(has?<Test goBack={()=>setView("home")} session={session} record={recordResult}/>:<NeedSession goBack={()=>setView("home")} onGoStudy={()=>setView("study")}/>)}
{view==="review"&&(has?<Review goBack={()=>setView("home")} session={session}/>:<NeedSession goBack={()=>setView("home")} onGoStudy={()=>setView("study")}/>)}
{view==="wrong"&&<Wrong goBack={()=>setView("home")} notes={notes} notesId={notesId} setNotes={setNotes} errors={errors}/>}
</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
